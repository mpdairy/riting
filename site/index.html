<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riting Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="tabs">
    <button class="tab active" data-tab="1">1</button>
    <button class="tab" data-tab="2">2</button>
    <button class="tab" data-tab="3">3</button>
    <button class="tab" data-tab="4">4</button>
    <button class="tab" data-tab="5">5</button>
    <button class="tab" data-tab="6">6</button>
    <button class="tab" data-tab="7">7</button>
    <button class="tab" data-tab="8">8</button>
  </div>
  <div id="page">
    <textarea id="editor" autofocus spellcheck="true"
              placeholder="Start writing and the Riting Assistant will occasionally assist you!"></textarea>
    <div id="status"></div>
  </div>
  <button id="settings-btn" title="Settings">&#9881;</button>
  <div id="modal" class="hidden">
    <div id="modal-backdrop"></div>
    <div id="modal-content">
      <h2>settings</h2>
      <div class="setting-section">your words before AI kicks in</div>
      <div class="range-row">
        <div class="range-field">
          <label for="user-min">min</label>
          <input type="number" id="user-min" min="1" max="200">
        </div>
        <div class="range-field">
          <label for="user-max">max</label>
          <input type="number" id="user-max" min="1" max="200">
        </div>
      </div>
      <div class="setting-section">AI approximate words per turn</div>
      <div class="range-row">
        <div class="range-field">
          <label for="ai-min">min</label>
          <input type="number" id="ai-min" min="1" max="200">
        </div>
        <div class="range-field">
          <label for="ai-max">max</label>
          <input type="number" id="ai-max" min="1" max="200">
        </div>
      </div>
      <div class="setting-section">writing style</div>
      <div class="slider-row">
        <span class="slider-label">cliche</span>
        <input type="range" id="originality" min="0" max="10" value="5" step="1">
        <span class="slider-label">original</span>
      </div>
      <div class="setting-section">advanced</div>
      <label for="key-input">your own groq api key (optional)
        <a href="https://console.groq.com/keys" target="_blank" rel="noopener"
           id="key-help">(get one)</a>
      </label>
      <input type="password" id="key-input" placeholder="gsk_..."
             autocomplete="off">
      <div id="modal-actions">
        <button id="cancel-btn">cancel</button>
        <button id="save-btn">save</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
